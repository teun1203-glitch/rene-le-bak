<!DOCTYPE html>
<html>
<head>
    <title>Rene le Bak</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        #app {
            min-height: 100vh;
            background: #0d0d0d;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            font-family: sans-serif;
        }
        h1 { font-size: 2.5rem; font-weight: 500; color: #fff; margin-bottom: 0.25rem; }
        .subtitle { color: #666; font-size: 0.9rem; margin-bottom: 3rem; }
        .card {
            background: #161616;
            border: 1px solid #2a2a2a;
            border-radius: 20px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            text-align: center;
        }
        .song-name { font-size: 1.5rem; font-weight: 500; color: #fff; min-height: 2rem; margin-bottom: 0.75rem; }
        .rule-badge {
            display: inline-block;
            padding: 0.5rem 1.25rem;
            border-radius: 999px;
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 2rem;
            background: #222;
            color: #aaa;
        }
        .rule-badge.safe { background: #0f2a1a; color: #4ade80; border: 1px solid #166534; }
        .rule-badge.drink { background: #1a1200; color: #fbbf24; border: 1px solid #854d0e; }
        .rule-badge.atje { background: #2a0a0a; color: #f87171; border: 1px solid #991b1b; }
        .btn-next {
            width: 100%;
            padding: 1rem;
            border-radius: 12px;
            background: #fff;
            color: #000;
            font-size: 1rem;
            font-weight: 500;
            border: none;
            cursor: pointer;
            margin-bottom: 0.75rem;
        }
        .btn-next:hover { background: #e5e5e5; }
        .btn-next:active { transform: scale(0.97); }
        .btn-mute {
            width: 100%;
            padding: 0.6rem;
            border-radius: 12px;
            background: transparent;
            color: #666;
            font-size: 0.85rem;
            font-weight: 500;
            border: 1px solid #2a2a2a;
            cursor: pointer;
        }
        .btn-mute:hover { background: #1a1a1a; color: #aaa; }
        .btn-mute.muted { color: #f87171; border-color: #991b1b; }
        .progress-bar { width: 100%; height: 3px; background: #222; border-radius: 999px; margin-bottom: 2rem; overflow: hidden; }
        .progress-fill { height: 100%; background: #fff; border-radius: 999px; width: 0%; transition: width 0.1s linear; }
        @keyframes flash { 0%,100% { background: #0d0d0d; } 50% { background: #3d0000; } }
        .flashing { animation: flash 0.3s ease 6; }
        .stats { display: flex; gap: 1rem; margin-top: 1.5rem; }
        .stat { flex: 1; background: #1a1a1a; border-radius: 10px; padding: 0.75rem; text-align: center; }
        .stat-num { font-size: 1.25rem; font-weight: 500; color: #fff; }
        .stat-label { font-size: 0.7rem; color: #555; margin-top: 2px; letter-spacing: 0.05em; }
    </style>
</head>
<body>
<div id="app">
    <h1>René le Bak</h1>
    <p class="subtitle">druk op de knop en zie wat je lot is</p>
    <div class="card">
        <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
        <div class="song-name" id="song-name">—</div>
        <div class="rule-badge" id="rule-badge">klik op volgende</div>
        <button class="btn-next" id="btn-next" onclick="nextSong()">Volgende</button>
        <button class="btn-mute" id="btn-mute" onclick="toggleMute()">Geluid aan</button>
        <div class="stats">
            <div class="stat">
                <div class="stat-num" id="streak-num">—</div>
                <div class="stat-label" id="streak-label">nog geen streak</div>
            </div>
        </div>
    </div>
</div>

<script>
    let streak = 0;
    let lastCategory = null;
    let progressInterval = null;
    let isMuted = false;

    async function nextSong() {
        const btn = document.getElementById('btn-next');
        btn.disabled = true;
        btn.textContent = 'laden...';

        let data;
        try {
            const res = await fetch('/next');
            data = await res.json();
        } catch(e) {
            document.getElementById('song-name').textContent = 'fout bij laden';
            btn.disabled = false;
            btn.textContent = 'Volgende';
            return;
        }

        document.getElementById('song-name').textContent = data.name;

        const badge = document.getElementById('rule-badge');
        badge.textContent = data.rule;
        badge.className = 'rule-badge';

        let category;
        if (data.rule.includes('SAFE')) {
            badge.classList.add('safe');
            category = 'safe';
        } else if (data.rule.includes('ATJE') || data.rule.includes('atje')) {
            badge.classList.add('atje');
            category = 'atje';
            document.getElementById('app').classList.add('flashing');
            setTimeout(() => document.getElementById('app').classList.remove('flashing'), 2000);
        } else {
            badge.classList.add('drink');
            category = 'drink';
        }

        if (category === lastCategory) {
            streak++;
        } else {
            streak = 1;
        }
        lastCategory = category;

        document.getElementById('streak-num').textContent = streak + 'x';
        document.getElementById('streak-label').textContent =
            streak === 1 ? category + ' Begin van streak' : category + ' streak' + ' !'.repeat(Math.min(streak - 1, 3));

        playAudio(data.youtubeId);

        btn.disabled = false;
        btn.textContent = 'Volgende';
    }

    function toggleMute() {
        isMuted = !isMuted;
        const btn = document.getElementById('btn-mute');
        btn.textContent = isMuted ? 'Geluid aan' : 'Geluid uit';
        btn.classList.toggle('muted', isMuted);

        const frame = document.getElementById('yt-frame');
        if (frame) {
            const currentSrc = frame.src.replace(/&mute=\d/, '');
            frame.src = currentSrc + '&mute=' + (isMuted ? 1 : 0);
        }
    }

    function playAudio(id) {
        if (progressInterval) clearInterval(progressInterval);
        const progress = document.getElementById('progress');
        let pct = 0;
        progress.style.width = '0%';
        progressInterval = setInterval(() => {
            pct += 0.5;
            if (pct > 100) pct = 100;
            progress.style.width = pct + '%';
        }, 150);

        let existing = document.getElementById('yt-frame');
        if (existing) existing.remove();
        const frame = document.createElement('iframe');
        frame.id = 'yt-frame';
        frame.src = `https://www.youtube.com/embed/${id}?autoplay=1&mute=${isMuted ? 1 : 0}&start=1`;
        frame.style.cssText = 'position:fixed;bottom:-9999px;width:1px;height:1px;opacity:0;';
        frame.allow = 'autoplay; encrypted-media';
        document.body.appendChild(frame);
    }
</script>
</body>
</html>
